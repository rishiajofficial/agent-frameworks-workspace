# Render Blueprint – deploy from dashboard: New → Blueprint → connect this repo → Deploy
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: agent-frameworks-crew
    runtime: python
    rootDir: crewai
    buildCommand: pip install .
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Set in Render Dashboard (Environment)
    healthCheckPath: /
